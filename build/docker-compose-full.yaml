services:
  postgres:
    image: postgres:18.3
    container_name: db
    environment:
      POSTGRES_DB: company_db
      POSTGRES_USER: company_admin
      POSTGRES_PASSWORD: company_admin_pw
    ports:
      - 5435:5432
    networks:
      - my_network
    volumes:
      - pgdata:/var/lib/postgresql
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181
    networks:
      - my_network

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - my_network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10

  init-kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - kafka
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "
      kafka-topics --bootstrap-server kafka:29092 --list
      echo 'Creating kafka topic...'
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic cdc-topic --replication-factor 1 --partitions 1 
      echo 'Topic created successfully'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - my_network
    
  companies:
    build:
      context: ./..
      dockerfile: ./build/Dockerfile
    depends_on:
      - postgres
      - kafka
    ports:
      - 8081:8080
    networks:
      - my_network
    volumes:
      - ./../config/:/config/
    command: /companies -conf /config/config.container.yaml
    restart: on-failure
    
networks:
  my_network:
    driver: bridge

volumes:
  pgdata: